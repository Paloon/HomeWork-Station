<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการงานนักเรียน ม.5/2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', 'Inter', sans-serif; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b px-6 py-4 flex justify-between items-center shrink-0">
        <h1 class="text-xl font-bold text-gray-800">Student Task Tracker <span class="text-blue-600">ม.5/2</span></h1>
        <button id="open-add-task" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all">
            + เพิ่มงานใหม่
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">

        <!-- Left Side: Student List (Desktop: Block, Mobile: Tab 1) -->
        <section id="student-section" class="w-full md:w-80 lg:w-96 border-r bg-white flex flex-col transition-all">
            <div class="p-4 border-b bg-gray-50">
                <div class="flex gap-2">
                    <input type="text" id="search-student" placeholder="ค้นหาชื่อ/เลขที่..." class="w-full px-3 py-2 border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mt-3 flex items-center gap-2 text-xs text-gray-500">
                    <input type="checkbox" id="filter-pending" class="rounded">
                    <label for="filter-pending">แสดงเฉพาะคนที่มีงานค้าง</label>
                </div>
            </div>
            <div id="student-list" class="flex-1 overflow-y-auto custom-scrollbar">
                <!-- Student items will be injected here -->
                <div class="p-4 text-center text-gray-400">กำลังโหลดรายชื่อ...</div>
            </div>
        </section>

        <!-- Right Side: Assignments (Desktop: Block, Mobile: Tab 2) -->
        <section id="assignment-section" class="hidden md:flex flex-1 flex-col bg-slate-50 overflow-hidden">
            <div id="no-student-selected" class="flex-1 flex flex-col items-center justify-center text-gray-400 p-8 text-center">
                <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <p>กรุณาเลือกนักเรียนจากรายชื่อทางซ้ายเพื่อดูรายการงาน</p>
            </div>

            <div id="assignment-view" class="hidden flex-1 flex flex-col overflow-hidden">
                <div class="p-6 bg-white border-b flex justify-between items-end">
                    <div>
                        <h2 id="selected-student-name" class="text-2xl font-bold text-gray-800">ชื่อนักเรียน</h2>
                        <p id="selected-student-id" class="text-gray-500 text-sm">เลขที่ -</p>
                    </div>
                    <div class="text-right">
                        <span id="student-progress-text" class="text-sm font-semibold text-blue-600">ความคืบหน้า 0%</span>
                        <div class="w-32 h-2 bg-gray-200 rounded-full mt-1 overflow-hidden">
                            <div id="student-progress-bar" class="h-full bg-blue-600 transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="p-4 flex gap-2 overflow-x-auto shrink-0">
                    <button data-filter="all" class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-gray-200 text-gray-700 hover:bg-blue-600 hover:text-white transition-all active">ทั้งหมด</button>
                    <!-- Subject filters will be injected here -->
                </div>

                <div id="assignment-list" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                    <!-- Assignment items will be injected here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Mobile Navigation Tabs -->
    <nav class="md:hidden flex border-t bg-white shrink-0">
        <button id="tab-students" class="flex-1 py-3 text-sm font-medium border-b-2 border-blue-600 text-blue-600">รายชื่อ</button>
        <button id="tab-tasks" class="flex-1 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500">งาน</button>
    </nav>

    <!-- Modal: Add Assignment -->
    <div id="modal-add-task" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800">เพิ่มงานใหม่</h3>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600">&times;</button>
            </div>
            <form id="task-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">ชื่องาน</label>
                    <input type="text" name="title" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">วิชา</label>
                        <input type="text" name="subject" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">ประเภทงาน</label>
                        <select name="type" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="การบ้าน">การบ้าน</option>
                            <option value="โปรเจกต์">โปรเจกต์</option>
                            <option value="แบบฝึกหัด">แบบฝึกหัด</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">วันที่ส่ง</label>
                    <input type="date" name="deadline" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">ลิงก์ไฟล์แนบ (ถ้ามี)</label>
                    <input type="url" name="link" placeholder="https://..." class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-200">
                    บันทึกงานลงระบบ
                </button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
